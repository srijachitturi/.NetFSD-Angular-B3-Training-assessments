<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: Arial;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: white;
    padding: 25px;
    width: 320px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  h3 {
    color: #333;
  }

  button {
    padding: 10px 18px;
    background: #6c5ce7;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
  }

  button:hover {
    background: #4834d4;
  }

  #msg {
    margin-top: 15px;
    color: #27ae60;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="card">
  <h3>Feedback</h3>
  <button id="btnFeedback">Submit Feedback</button>
  <p id="msg"></p>
</div>

<script>
  let btn = document.getElementById("btnFeedback");
  let msg = document.getElementById("msg");

  btn.addEventListener("click", function()
  {
    msg.innerText = "Thank you for your feedback!";
  });
</script>

</body>
</html>
