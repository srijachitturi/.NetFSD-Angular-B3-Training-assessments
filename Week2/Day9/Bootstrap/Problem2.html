<!DOCTYPE html>
<html>
<head>
  <title>Product Listing</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-4">
    <h3 class="text-center mb-4">Electronics Store</h3>

    <div class="row g-3">

      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://images.unsplash.com/photo-1523206489230-c012c64b2b48?w=400"
               class="card-img-top" style="height:220px; object-fit:cover;">
          <div class="card-body text-center">
            <h6 class="card-title">Smartphone</h6>
            <p class="text-muted">₹25,000</p>
            <button class="btn btn-success btn-sm">Add to Cart</button>
            <button class="btn btn-primary btn-sm">View Details</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400"
               class="card-img-top" style="height:220px; object-fit:cover;">
          <div class="card-body text-center">
            <h6 class="card-title">Laptop</h6>
            <p class="text-muted">₹60,000</p>
            <button class="btn btn-success btn-sm">Add to Cart</button>
            <button class="btn btn-primary btn-sm">View Details</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"
               class="card-img-top" style="height:220px; object-fit:cover;">
          <div class="card-body text-center">
            <h6 class="card-title">Headphones</h6>
            <p class="text-muted">₹5,000</p>
            <button class="btn btn-success btn-sm">Add to Cart</button>
            <button class="btn btn-primary btn-sm">View Details</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400"
               class="card-img-top" style="height:220px; object-fit:cover;">
          <div class="card-body text-center">
            <h6 class="card-title">Smart Watch</h6>
            <p class="text-muted">₹8,000</p>
            <button class="btn btn-success btn-sm">Add to Cart</button>
            <button class="btn btn-primary btn-sm">View Details</button>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
