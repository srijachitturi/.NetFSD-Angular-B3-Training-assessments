<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e0e7ff, #f8fafc);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .navbar {
            background: linear-gradient(90deg, #0f172a, #1e3a8a);
        }

        .sidebar {
            background: linear-gradient(180deg, #0f172a, #1e293b);
            min-height: 100vh;
            border-right: 2px solid #334155;
        }

        .sidebar h5 {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            padding: 12px 18px;
            margin: 4px 8px;
            border-radius: 6px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #3b82f6;
            color: white;
            transform: translateX(5px);
        }

        .card {
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .card h5 {
            font-weight: 600;
        }

        .card p {
            color: #64748b;
        }

        .btn {
            border-radius: 8px;
        }

        footer {
            background: linear-gradient(90deg, #020617, #0f172a);
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .modal-content {
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark p-5">
        <div class="container-fluid justify-content-center">

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <a class="navbar-brand brand">College Event Management Dashboard</a>

        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <div class="col-lg-2 col-md-3 sidebar collapse show" id="sidebarMenu">

                <h5 class="text-white text-center mt-3">School Panel</h5>

                <a href="#">Dashboard</a>
                <a href="#">Events</a>
                <a href="#">Students</a>
                <a href="#">Teachers</a>
                <a href="#">Departments</a>
                <a href="#">Results</a>
                <a href="#">Settings</a>

            </div>

            <div class="col-lg-10 col-md-9 p-4">

                <h3 class="mb-4">Upcoming Events</h3>

                <div class="row g-4">

                    <div class="col-xl-3 col-lg-4 col-md-6">
                        <div class="card p-3">
                            <h5>Science Fair</h5>
                            <p>Date: May 10</p>
                            <button class="btn btn-primary btn-sm">View</button>
                        </div>
                    </div>

                    <div class="col-xl-3 col-lg-4 col-md-6">
                        <div class="card p-3">
                            <h5>Sports Day</h5>
                            <p>Date: June 2</p>
                            <button class="btn btn-success btn-sm">View</button>
                        </div>
                    </div>

                    <div class="col-xl-3 col-lg-4 col-md-6">
                        <div class="card p-3">
                            <h5>Annual Day</h5>
                            <p>Date: July 15</p>
                            <button class="btn btn-warning btn-sm">View</button>
                        </div>
                    </div>

                    <div class="col-xl-3 col-lg-4 col-md-6">
                        <div class="card p-3">
                            <h5>Tech Fest</h5>
                            <p>Date: Aug 20</p>
                            <button class="btn btn-info btn-sm">View</button>
                        </div>
                    </div>

                </div>

                <div class="mt-5">
                    <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#eventModal">
                        Add Event
                    </button>
                </div>

            </div>

        </div>
    </div>


    <div class="modal fade" id="eventModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">
                    <h5>Add Event</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form id="eventForm">

                        <div class="mb-3">
                            <label class="form-label">Event Name</label>
                            <input type="text" class="form-control" id="eventName" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Event Date</label>
                            <input type="date" class="form-control" id="eventDate" required>
                        </div>

                        <button class="btn btn-primary w-100">Add Event</button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <footer class="p-4">
        College Event Management System &copy; 2026
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
