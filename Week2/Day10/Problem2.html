<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Landing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f8f9fa; }

    .hero{
      background:#0d6efd;
      color:white;
      padding:70px 0;
    }

    .hero img{
      max-width:100%;
      border-radius:10px;
    }

    .card img{
      height:200px;
      object-fit:cover;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">ShopNow</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end text-bg-dark" id="offcanvasMenu">
      <div class="offcanvas-header">
        <h5>Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>

      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Contact</a></li>
        </ul>
      </div>
    </div>

  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <div class="row align-items-center g-4">

      <div class="col-md-6">
        <h1 class="fw-bold">Welcome to ShopNow</h1>
        <p>Best Deals on Trending Products</p>
        <button class="btn btn-light btn-lg">Shop Now</button>
      </div>

      <div class="col-md-6 text-center">
        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=600" alt="shopping">
      </div>

    </div>
  </div>
</section>

<!-- Carousel -->
<div id="productCarousel" class="carousel slide container my-5" data-bs-ride="carousel">

  <div class="carousel-inner rounded">

    <div class="carousel-item active">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1200" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=1200" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1512499617640-c2f999018b72?w=1200" class="d-block w-100">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<!-- Products -->
<div class="container my-5">

  <h3 class="text-center mb-4">Products</h3>

  <div class="row g-4">

    <div class="col-12 col-sm-6 col-lg-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd?w=500" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Headphones</h5>
          <button class="btn btn-primary">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Smart Watch</h5>
          <button class="btn btn-primary">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4">
      <div class="card shadow">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Shoes</h5>
          <button class="btn btn-primary">Buy</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Newsletter -->
<div class="container my-5">

  <div class="card p-4 shadow">

    <h4 class="text-center">Subscribe to Newsletter</h4>

    <form class="row g-3 mt-2">

      <div class="col-md-8">
        <input type="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="col-md-4">
        <button class="btn btn-success w-100">Subscribe</button>
      </div>

    </form>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
